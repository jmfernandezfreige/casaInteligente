<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de usuario</title>
    <link rel="stylesheet" href="style_casas.css">
</head>

<body>
    <header>
        <h1>Registro de usuario</h1>

        <nav class="nav">
            <ul>
                <li><a href="index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>

    <section class="servicio" id="servicio">
        <h2>Cree una cuenta nueva</h2>
        <p>Introduzca sus datos para empezar a controlar sus viviendas.</p>

        <h3>¿Ya tiene cuenta?</h3>
        <a class="boton boton-1" href="login.html">Iniciar sesión</a>

        <form class="formulario registro" id="form-registro">
            <fieldset>
                <legend>Datos de usuario</legend>
                <label>Nombre completo</label>
                <input type="text" required name="nombre" placeholder="Pablo Fernández">

                <label>Correo electrónico</label>
                <input type="email" required name="email" placeholder="hola@gmail.com">

                <label>Contraseña</label>
                <div class="contenedor-password">
                    <input type="password" required name="contraseña" id="input-contraseña">
                    <button class="boton boton-3" id="ver-contraseña">Ver</button>
                </div>

                <label>Repita la contraseña</label>
                <div class="contenedor-password2">
                    <input type="password" required name="contraseña2" id="input-contraseña2">
                    <button class="boton boton-3" id="ver-contraseña2">Ver</button>
                </div>
            </fieldset>
            <button type="submit" class="boton boton-1">Crear cuenta</button>
        </form>
    </section>

    <footer>
        <p><a href="index.html">Inicio</a></p>
        <p>Contacto: +34 612 34 56 78</p>
        <p>&copy; José Manuel Fernández Freige</p>
    </footer>
</body>

</html>
